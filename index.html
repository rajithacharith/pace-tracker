<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070709" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #070709;
      --surface: #15151b;
      --surface-2: #1e1e26;
      --border: #26262f;
      --border-soft: rgba(255,255,255,0.06);
      --text-primary: #f5f5f7;
      --text-secondary: #9a9aa6;
      --text-dim: #5b5b66;
      --green: #00e676;
      --green-ink: #042c16;
      --yellow: #ffd21a;
      --red: #ff5247;
      --warn: #ff9f1c;
      --blue: #4fc3f7;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        max(16px, env(safe-area-inset-top))
        18px
        max(18px, env(safe-area-inset-bottom));
      gap: 14px;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    /* Ambient pace-zone glow behind everything */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(125% 75% at 50% -8%, var(--glow, transparent) 0%, transparent 62%);
      opacity: 0;
      transition: opacity .7s ease, background .7s ease;
      pointer-events: none;
    }
    body.z-ahead::before  { --glow: rgba(0,230,118,0.20);  opacity: 1; }
    body.z-near::before   { --glow: rgba(255,210,26,0.14); opacity: 1; }
    body.z-behind::before { --glow: rgba(255,82,71,0.20);  opacity: 1; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 460px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px rgba(0,230,118,0.8);
    }
    .brand-name {
      font-size: 14px; font-weight: 800; letter-spacing: 0.22em;
      color: var(--text-primary);
    }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text-secondary);
      font-size: 16px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .15s, color .2s, border-color .2s;
      position: relative;
    }
    .btn-icon:active { transform: scale(0.9); }
    .btn-icon.active { color: var(--green); border-color: var(--green); }
    .btn-icon .badge {
      position: absolute; top: -3px; right: -3px;
      width: 9px; height: 9px;
      background: var(--blue);
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: none;
    }
    .btn-icon .badge.visible { display: block; }

    .gps-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--text-secondary);
      padding-left: 4px;
    }
    .gps-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim);
      transition: background .3s;
    }
    .gps-dot.acquiring { background: var(--warn); animation: pulse 1.2s infinite; }
    .gps-dot.locked    { background: var(--green); }
    .gps-dot.error     { background: var(--red); }

    /* ── Stage (hero + stats) ── */
    .stage {
      flex: 1;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      min-height: 0;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
    }

    .pace-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .pace-value {
      font-size: clamp(92px, 27vw, 156px);
      font-weight: 800;
      line-height: 0.92;
      font-variant-numeric: tabular-nums;
      letter-spacing: -4px;
      color: var(--text-primary);
      transition: color .4s ease;
    }
    .pace-value.idle   { color: var(--text-dim); }
    .pace-value.ahead  { color: var(--green);  text-shadow: 0 0 40px rgba(0,230,118,0.35); }
    .pace-value.near   { color: var(--yellow); text-shadow: 0 0 40px rgba(255,210,26,0.25); }
    .pace-value.behind { color: var(--red);    text-shadow: 0 0 40px rgba(255,82,71,0.3); }

    .pace-unit {
      font-size: 15px; font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
      margin-top: 4px;
    }

    .pace-delta {
      margin-top: 12px;
      font-size: 14px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      padding: 7px 18px;
      border-radius: 30px;
      background: transparent;
      color: transparent;
      transition: color .4s, background .4s;
      min-height: 33px;
    }
    .pace-delta.ahead  { background: rgba(0,230,118,0.14); color: var(--green); }
    .pace-delta.near   { background: rgba(255,210,26,0.14); color: var(--yellow); }
    .pace-delta.behind { background: rgba(255,82,71,0.14);  color: var(--red); }

    /* ── Stats strip ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      width: 100%;
      flex-shrink: 0;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 18px;
      padding: 16px 8px 13px;
      text-align: center;
    }
    .stat-value {
      font-size: 23px; font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* ── Turn guidance card ── */
    .turn-card {
      width: 100%;
      display: none;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px 18px;
      flex-shrink: 0;
      animation: slideDown .25s ease;
    }
    .turn-card.visible { display: flex; }
    .turn-card.imminent {
      background: rgba(255,159,28,0.12);
      border-color: var(--warn);
      box-shadow: 0 0 30px rgba(255,159,28,0.15);
    }
    .turn-arrow-box {
      font-size: 42px; line-height: 1;
      flex-shrink: 0; width: 52px; text-align: center;
      color: var(--text-primary);
    }
    .turn-card.imminent .turn-arrow-box { color: var(--warn); }
    .turn-info { flex: 1; min-width: 0; text-align: left; }
    .turn-direction { font-size: 17px; font-weight: 800; color: var(--text-primary); line-height: 1.15; }
    .turn-dist { font-size: 13px; color: var(--text-secondary); margin-top: 3px; font-variant-numeric: tabular-nums; }
    .turn-card.imminent .turn-direction { color: var(--warn); }
    .turn-card.imminent .turn-dist { color: var(--warn); font-weight: 700; }

    /* ── Setup panel (collapses while running) ── */
    .setup {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .gpx-banner {
      width: 100%;
      display: none;
      align-items: center;
      justify-content: space-between;
      background: rgba(79,195,247,0.09);
      border: 1px solid rgba(79,195,247,0.28);
      border-radius: 14px;
      padding: 11px 16px;
      gap: 8px;
    }
    .gpx-banner.visible { display: flex; }
    .gpx-banner-text {
      font-size: 13px; color: var(--blue); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gpx-banner-clear {
      background: transparent; border: none; color: var(--text-secondary);
      font-size: 18px; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 0 2px;
    }

    .target-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .target-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .target-setter {
      display: flex; align-items: center;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      padding: 10px 8px;
      width: 100%;
    }
    .target-group { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .target-sep { font-size: 30px; font-weight: 800; color: var(--text-dim); line-height: 1; }
    .adj-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 24px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, background .2s;
    }
    .adj-btn:active { transform: scale(0.88); background: var(--green); color: var(--green-ink); border-color: var(--green); }
    .target-display {
      font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums;
      color: var(--text-primary); min-width: 46px; text-align: center; line-height: 1;
    }
    .target-unit {
      font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em;
      text-transform: uppercase; padding-right: 12px; padding-left: 4px;
    }
    .target-section.locked .adj-btn { opacity: 0.25; pointer-events: none; }
    .target-section.locked .target-display,
    .target-section.locked .target-sep,
    .target-section.locked .target-unit { opacity: 0.4; }

    /* ── Bottom dock ── */
    .dock {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .unit-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 3px;
      gap: 3px;
    }
    .unit-btn {
      padding: 8px 24px;
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      background: transparent; border: none; border-radius: 9px;
      color: var(--text-secondary); cursor: pointer;
      transition: all .2s;
    }
    .unit-btn.active { background: var(--green); color: var(--green-ink); }

    .btn-start {
      width: 100%;
      height: 66px;
      border-radius: 20px;
      border: none;
      background: var(--green);
      color: var(--green-ink);
      font-size: 17px; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .15s, background .25s, box-shadow .25s;
      box-shadow: 0 8px 30px rgba(0,230,118,0.25);
    }
    .btn-start:active { transform: scale(0.97); }
    .btn-start.running {
      background: var(--red); color: #fff;
      box-shadow: 0 8px 30px rgba(255,82,71,0.25);
    }

    .accuracy-bar {
      font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em;
      min-height: 14px; text-align: center;
    }

    /* ── Running mode transforms ── */
    body.running .setup { display: none; }
    body.running .unit-toggle { display: none; }
    body.running .pace-value { font-size: clamp(104px, 32vw, 184px); }
    body.running .pace-label { color: var(--green); }

    /* ── Permission overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; padding: 40px; text-align: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .overlay-icon  { font-size: 60px; animation: popIn .4s ease; }
    .overlay-title { font-size: 24px; font-weight: 800; }
    .overlay-body  { font-size: 15px; color: var(--text-secondary); line-height: 1.6; max-width: 300px; }
    .btn-primary {
      padding: 15px 40px;
      background: var(--green); color: var(--green-ink);
      border: none; border-radius: 50px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,230,118,0.25);
    }
    .btn-primary:active { transform: scale(0.96); }

    /* ── Full-screen map overlay ── */
    .map-overlay {
      position: fixed; inset: 0;
      z-index: 50;
      display: flex; flex-direction: column;
      background: #111;
      transform: translateY(100%);
      transition: transform .38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .map-overlay.open { transform: translateY(0); }
    #map { flex: 1; width: 100%; }

    .map-pace-chip {
      position: absolute;
      top: max(16px, env(safe-area-inset-top)); left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(7,7,9,0.82);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 9px 22px;
      display: flex; align-items: baseline; gap: 7px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      pointer-events: none;
    }
    .map-pace-val {
      font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums;
      color: var(--text-primary); transition: color .4s;
    }
    .map-pace-val.idle   { color: var(--text-dim); }
    .map-pace-val.ahead  { color: var(--green); }
    .map-pace-val.near   { color: var(--yellow); }
    .map-pace-val.behind { color: var(--red); }
    .map-pace-unit { font-size: 12px; color: var(--text-secondary); }

    .map-presets {
      position: absolute;
      top: calc(max(16px, env(safe-area-inset-top)) + 60px);
      left: 12px; right: 12px;
      z-index: 1000;
      display: flex; flex-wrap: wrap; gap: 8px;
      pointer-events: none;
    }
    .btn-preset {
      background: rgba(7,7,9,0.82);
      border: 1px solid rgba(79,195,247,0.4);
      border-radius: 30px;
      padding: 8px 18px;
      color: var(--blue);
      font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      pointer-events: all;
      transition: background .2s, transform .12s;
    }
    .btn-preset:active { transform: scale(0.93); }
    .btn-preset.loaded { background: rgba(79,195,247,0.22); border-color: var(--blue); }

    .map-bottom-bar {
      position: absolute;
      bottom: max(28px, env(safe-area-inset-bottom)); left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex; align-items: center; gap: 10px;
    }
    .btn-map-action {
      background: rgba(7,7,9,0.82);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 12px 24px;
      color: var(--text-secondary);
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
      transition: transform .12s;
    }
    .btn-map-action:active { transform: scale(0.95); }
    .btn-map-action.gpx { color: var(--blue); border-color: rgba(79,195,247,0.4); }

    /* Map turn-marker tooltip */
    .leaflet-tooltip.turn-tip {
      background: rgba(7,7,9,0.9);
      border: 1px solid rgba(255,159,28,0.5);
      color: #fff; font-size: 12px; font-weight: 700;
      padding: 5px 11px; border-radius: 9px; white-space: nowrap;
    }
    .leaflet-tooltip.turn-tip::before { display: none; }

    /* Leaflet dark tile tweak */
    .leaflet-tile { filter: brightness(0.82) saturate(0.82) hue-rotate(5deg); }
    .leaflet-container { background: #16161c; }

    /* ── Run summary overlay ── */
    .summary-overlay {
      position: fixed; inset: 0;
      z-index: 60;
      background: var(--bg);
      display: flex; flex-direction: column;
      padding:
        max(20px, env(safe-area-inset-top))
        20px
        max(24px, env(safe-area-inset-bottom));
      gap: 18px;
      transform: translateY(100%);
      transition: transform .38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .summary-overlay.open { transform: translateY(0); }

    .summary-head { display: flex; align-items: center; justify-content: space-between; }
    .summary-title { font-size: 20px; font-weight: 800; letter-spacing: 0.02em; }
    .summary-close {
      background: var(--green); color: var(--green-ink);
      border: none; border-radius: 40px;
      padding: 10px 24px; font-size: 14px; font-weight: 800;
      letter-spacing: 0.05em; cursor: pointer;
    }
    .summary-close:active { transform: scale(0.95); }

    .summary-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .sum-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }
    .sum-val {
      font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums;
      color: var(--text-primary); line-height: 1;
    }
    .sum-lbl {
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-dim); margin-top: 7px;
    }

    .summary-chart {
      flex: 1;
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 18px;
      padding: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .summary-chart svg { width: 100%; height: 100%; display: block; }
    .summary-chart .empty { color: var(--text-dim); font-size: 14px; }

    .summary-foot {
      text-align: center; font-size: 12px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim);
    }
  </style>
</head>
<body>

  <!-- Permission overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-icon">🏃</div>
    <div class="overlay-title">Location Access Needed</div>
    <div class="overlay-body">Pace uses GPS to track your running pace in real time.</div>
    <button class="btn-primary" id="btnAllow">Enable GPS</button>
    <div class="overlay-body" id="overlayError" style="color:var(--red);display:none;"></div>
  </div>

  <!-- Full-screen map overlay -->
  <div class="map-overlay" id="mapOverlay">
    <div class="map-pace-chip">
      <span class="map-pace-val idle" id="mapPaceVal">--:--</span>
      <span class="map-pace-unit" id="mapPaceUnit">min / km</span>
    </div>
    <div class="map-presets" id="mapPresets"></div>
    <div id="map"></div>
    <div class="map-bottom-bar">
      <button class="btn-map-action gpx" onclick="document.getElementById('gpxInput').click()">Import GPX</button>
      <button class="btn-map-action" onclick="closeMap()">Close Map</button>
    </div>
  </div>

  <!-- Run summary overlay (shown after Stop) -->
  <div class="summary-overlay" id="summaryOverlay">
    <div class="summary-head">
      <span class="summary-title">Run Summary</span>
      <button class="summary-close" onclick="closeSummary()">Done</button>
    </div>
    <div class="summary-stats">
      <div class="sum-card"><div class="sum-val" id="sumDist">0.00</div><div class="sum-lbl" id="sumDistLbl">km</div></div>
      <div class="sum-card"><div class="sum-val" id="sumTime">0:00</div><div class="sum-lbl">time</div></div>
      <div class="sum-card"><div class="sum-val" id="sumAvg">--:--</div><div class="sum-lbl">avg pace</div></div>
      <div class="sum-card"><div class="sum-val" id="sumBest">--:--</div><div class="sum-lbl">best pace</div></div>
    </div>
    <div class="summary-chart" id="summaryChart"></div>
    <div class="summary-foot" id="summaryFoot">Pace over distance</div>
  </div>

  <!-- Hidden GPX file input -->
  <input type="file" id="gpxInput" accept=".gpx" style="display:none" onchange="loadGpx(event)" />

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">PACE</span>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" id="btnVoice" onclick="toggleVoice()" title="Voice cues">🔇</button>
      <button class="btn-icon" id="btnGpx" onclick="document.getElementById('gpxInput').click()" title="Import GPX">
        📂<span class="badge" id="gpxBadge"></span>
      </button>
      <button class="btn-icon" id="btnMap" onclick="openMap()" title="Show map">
        🗺<span class="badge" id="mapBadge"></span>
      </button>
      <div class="gps-status">
        <div class="gps-dot" id="gpsDot"></div>
        <span id="gpsLabel">—</span>
      </div>
    </div>
  </header>

  <!-- Stage: turn card + hero + stats -->
  <main class="stage">
    <div class="turn-card" id="turnCard">
      <div class="turn-arrow-box" id="turnArrow">→</div>
      <div class="turn-info">
        <div class="turn-direction" id="turnDirection">Turn right</div>
        <div class="turn-dist" id="turnDist">in 85m</div>
      </div>
    </div>

    <div class="hero">
      <div class="pace-label">Current Pace</div>
      <div class="pace-value idle" id="paceValue">--:--</div>
      <div class="pace-unit" id="paceUnit">min / km</div>
      <div class="pace-delta" id="paceDelta"></div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statDistance">0.00</div>
        <div class="stat-label" id="statDistLabel">km</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTime">0:00</div>
        <div class="stat-label">time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSpeed">0.0</div>
        <div class="stat-label" id="statSpeedLabel">km/h</div>
      </div>
    </div>
  </main>

  <!-- Setup panel (hidden while running) -->
  <div class="setup">
    <div class="gpx-banner" id="gpxBanner">
      <span class="gpx-banner-text" id="gpxBannerText">No route loaded</span>
      <button class="gpx-banner-clear" onclick="clearGpx()" title="Remove route">✕</button>
    </div>

    <div class="target-section">
      <div class="target-label">Target Pace</div>
      <div class="target-setter">
        <div class="target-group">
          <button class="adj-btn" onclick="adjustTarget('min', -1)">−</button>
          <div class="target-display" id="targetMin">6</div>
          <button class="adj-btn" onclick="adjustTarget('min', 1)">+</button>
        </div>
        <div class="target-sep">:</div>
        <div class="target-group">
          <button class="adj-btn" onclick="adjustTarget('sec', -5)">−</button>
          <div class="target-display" id="targetSec">00</div>
          <button class="adj-btn" onclick="adjustTarget('sec', 5)">+</button>
        </div>
        <div class="target-unit" id="targetUnit">/ km</div>
      </div>
    </div>
  </div>

  <!-- Bottom dock -->
  <footer class="dock">
    <div class="unit-toggle">
      <button class="unit-btn active" id="btnKm" onclick="setUnit('km')">KM</button>
      <button class="unit-btn" id="btnMi" onclick="setUnit('mi')">MI</button>
    </div>
    <button class="btn-start" id="btnStart" onclick="toggleTracking()">Start Run</button>
    <div class="accuracy-bar" id="accuracyBar"></div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let watchId = null, wakeLock = null;
    let running = false;
    let unit = 'km';
    let startTime = null, timerInterval = null;
    let totalDistance = 0;
    let lastPos = null;
    const SMOOTHING = 0.35;        // gentle EMA applied on top of the window
    const PACE_WINDOW_MS = 15000;  // trailing window for averaging pace (15s)
    let smoothSpeed = 0;
    let paceSamples = [];          // [{ t, dist }] recent cumulative-distance samples
    let targetMin = 6, targetSec = 0;

    // Pace history for the post-run graph
    let paceHistory = [];          // [{ t (s), distM, speed (m/s) }]
    let lastHistAt = 0;
    const HIST_INTERVAL_MS = 3000; // sample the graph every ~3s
    const HIST_MIN_SPEED = 0.5;    // ignore near-stopped samples (avoids pace spikes)

    // DeviceMotion
    const MOTION_WINDOW = 60;
    const STATIONARY_VARIANCE = 0.8;
    const STATIONARY_GRAVITY  = 1.5;
    let motionSamples = [];
    let motionDecayTimer = null;

    // Voice cues
    let voiceOn = false;
    let lastCueZone = null;     // last pace zone we announced
    let lastCueAt = 0;          // timestamp of last pace cue
    const CUE_GAP_MS = 12000;   // min gap between pace cues on zone change
    const CUE_REMIND_MS = 30000;// re-remind interval while off pace
    let spokenWarnIdx = -1;     // turn idx we've voiced the approach for
    let spokenNowIdx  = -1;     // turn idx we've voiced "now" for
    try { voiceOn = localStorage.getItem('voiceOn') === '1'; } catch (e) {}

    // Map
    let map = null;
    let posMarker = null;
    let routeLine = null;
    let routeCoords = [];
    let mapInitialized = false;

    // GPX planned route
    let gpxLine = null;
    let gpxCoords = [];
    let gpxName = '';

    // Turn-by-turn navigation
    let turns = [];          // [{idx, lat, lng, delta, label, arrow}]
    let turnMarkers = [];    // Leaflet markers on map
    let routeProgress = 0;   // index of nearest GPX point to current position

    const TURN_THRESHOLD = 30;   // degrees — min bearing change = a turn
    const TURN_SEGMENT   = 8;    // sample every Nth GPX point for bearing
    const TURN_WARN_M    = 120;  // metres — start showing turn card
    const TURN_NOW_M     = 25;   // metres — "Turn now!"
    const TURN_MERGE_M   = 30;   // metres — merge duplicate nearby detections
    const OFF_ROUTE_M    = 40;   // metres — beyond this from route = off-route, ignore

    // Preset routes bundled with the app
    const PRESET_ROUTES = [
      { label: 'CNR 5k', file: 'CNR 5k Route.gpx' },
    ];

    // ── DOM ───────────────────────────────────────────────────────────────────
    const overlay      = document.getElementById('overlay');
    const overlayError = document.getElementById('overlayError');
    const gpsDot       = document.getElementById('gpsDot');
    const gpsLabel     = document.getElementById('gpsLabel');
    const paceValue    = document.getElementById('paceValue');
    const paceUnit     = document.getElementById('paceUnit');
    const paceDelta    = document.getElementById('paceDelta');
    const mapPaceVal   = document.getElementById('mapPaceVal');
    const mapPaceUnit  = document.getElementById('mapPaceUnit');
    const statSpeed    = document.getElementById('statSpeed');
    const statDistance = document.getElementById('statDistance');
    const statTime     = document.getElementById('statTime');
    const btnStart     = document.getElementById('btnStart');
    const btnMap       = document.getElementById('btnMap');
    const btnGpx       = document.getElementById('btnGpx');
    const accuracyBar  = document.getElementById('accuracyBar');
    const targetMinEl  = document.getElementById('targetMin');
    const targetSecEl  = document.getElementById('targetSec');

    // ── GPS init ──────────────────────────────────────────────────────────────
    if (!('geolocation' in navigator)) {
      overlayError.textContent = 'Geolocation not supported by this browser.';
      overlayError.style.display = 'block';
      document.getElementById('btnAllow').style.display = 'none';
    }
    document.getElementById('btnAllow').addEventListener('click', requestLocation);
    requestLocation();

    function requestLocation() {
      overlayError.style.display = 'none';
      setGps('acquiring', 'Acquiring…');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          overlay.classList.add('hidden');
          setGps('locked', 'GPS Ready');
          initMap(pos.coords.latitude, pos.coords.longitude);
        },
        (err) => { setGps('error', 'Error'); overlayError.textContent = geoErrorMsg(err); overlayError.style.display = 'block'; },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    // ── Map ───────────────────────────────────────────────────────────────────
    function initMap(lat, lng) {
      if (mapInitialized) return;
      mapInitialized = true;

      map = L.map('map', { zoomControl: false, attributionControl: false })
              .setView([lat, lng], 16);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
      }).addTo(map);

      L.control.zoom({ position: 'bottomright' }).addTo(map);

      // Current position marker — glowing green dot
      const icon = L.divIcon({
        className: '',
        html: `<div style="
          width:16px;height:16px;
          background:#00e676;
          border:3px solid #fff;
          border-radius:50%;
          box-shadow:0 0 0 4px rgba(0,230,118,0.3);
        "></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });
      posMarker = L.marker([lat, lng], { icon }).addTo(map);

      routeLine = L.polyline([], {
        color: '#00e676',
        weight: 4,
        opacity: 0.85,
      }).addTo(map);

      // Planned GPX route (drawn below the live route)
      gpxLine = L.polyline(gpxCoords, {
        color: '#4fc3f7',
        weight: 3,
        opacity: 0.6,
        dashArray: '8 6',
      }).addTo(map);

      // If GPX was loaded before map opened, fit to it now
      if (gpxCoords.length > 1) {
        map.fitBounds(gpxLine.getBounds(), { padding: [40, 40] });
      }
    }

    function updateMap(lat, lng) {
      if (!map) return;
      posMarker.setLatLng([lat, lng]);
      routeCoords.push([lat, lng]);
      routeLine.setLatLngs(routeCoords);
      // Keep map centered on current position
      map.panTo([lat, lng], { animate: true, duration: 0.5 });
    }

    function openMap() {
      document.getElementById('mapOverlay').classList.add('open');
      btnMap.classList.add('active');
      // Leaflet needs a size recalc after display
      if (map) setTimeout(() => map.invalidateSize(), 50);
    }

    function closeMap() {
      document.getElementById('mapOverlay').classList.remove('open');
      btnMap.classList.remove('active');
    }

    // ── GPX import ────────────────────────────────────────────────────────────
    function loadGpx(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => applyGpxText(ev.target.result, file.name.replace('.gpx', ''));
      reader.readAsText(file);
      e.target.value = '';
    }

    function clearGpx() {
      gpxCoords = [];
      gpxName = '';
      turns = [];
      routeProgress = 0;
      if (gpxLine) gpxLine.setLatLngs([]);
      clearTurnMarkers();
      hideTurnCard();
      document.getElementById('gpxBanner').classList.remove('visible');
      document.getElementById('gpxBadge').classList.remove('visible');
      renderPresetChips();
    }

    function loadGpxFromUrl(url, name) {
      fetch(url)
        .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
        .then(text => applyGpxText(text, name))
        .catch(err => alert('Could not load route: ' + err.message));
    }

    function applyGpxText(text, fallbackName) {
      const xml = new DOMParser().parseFromString(text, 'application/xml');
      const pts = xml.querySelectorAll('trkpt').length ? xml.querySelectorAll('trkpt')
                : xml.querySelectorAll('rtept').length ? xml.querySelectorAll('rtept')
                : xml.querySelectorAll('wpt');
      if (!pts.length) { alert('No route points found in this GPX file.'); return; }

      gpxCoords = Array.from(pts).map(p => [
        parseFloat(p.getAttribute('lat')),
        parseFloat(p.getAttribute('lon')),
      ]);
      gpxName = (xml.querySelector('name')?.textContent || fallbackName || 'Route').trim();

      document.getElementById('gpxBanner').classList.add('visible');
      document.getElementById('gpxBannerText').textContent = `Route: ${gpxName} (${pts.length} pts)`;
      document.getElementById('gpxBadge').classList.add('visible');

      if (gpxLine) {
        gpxLine.setLatLngs(gpxCoords);
        map.fitBounds(gpxLine.getBounds(), { padding: [40, 40] });
      }

      turns = detectTurns(gpxCoords);
      routeProgress = 0;
      drawTurnMarkers();
      renderPresetChips();
      openMap();
    }

    function renderPresetChips() {
      const container = document.getElementById('mapPresets');
      container.innerHTML = '';
      PRESET_ROUTES.forEach(route => {
        const btn = document.createElement('button');
        btn.className = 'btn-preset' + (gpxName === route.label || gpxName.startsWith(route.label) ? ' loaded' : '');
        btn.textContent = route.label;
        btn.onclick = () => loadGpxFromUrl(route.file, route.label);
        container.appendChild(btn);
      });
    }

    // Render preset chips on init
    renderPresetChips();

    // Reflect saved voice preference on the toggle button
    document.getElementById('btnVoice').textContent = voiceOn ? '🔊' : '🔇';
    document.getElementById('btnVoice').classList.toggle('active', voiceOn);

    // ── Turn detection ────────────────────────────────────────────────────────
    function computeBearing(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
      const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180)
              - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function angleDiff(b1, b2) {
      let d = b2 - b1;
      while (d >  180) d -= 360;
      while (d < -180) d += 360;
      return d;
    }

    function turnLabel(delta) {
      const a = Math.abs(delta);
      const side = delta > 0 ? 'right' : 'left';
      if (a >= 150) return 'U-turn';
      if (a >= 100) return `Sharp ${side}`;
      if (a >=  30) return `Turn ${side}`;
      return 'Continue straight';
    }

    function turnArrowChar(delta) {
      const a = Math.abs(delta);
      if (a >= 150) return '↩';
      if (delta >=  100) return '↪';
      if (delta >=   30) return '→';
      if (delta <= -100) return '↩';
      if (delta <=  -30) return '←';
      return '↑';
    }

    function detectTurns(coords) {
      if (coords.length < TURN_SEGMENT * 2 + 1) return [];
      const result = [];
      for (let i = TURN_SEGMENT; i < coords.length - TURN_SEGMENT; i += Math.max(1, Math.floor(TURN_SEGMENT / 2))) {
        const b1 = computeBearing(
          coords[i - TURN_SEGMENT][0], coords[i - TURN_SEGMENT][1],
          coords[i][0],                coords[i][1]
        );
        const b2 = computeBearing(
          coords[i][0],                coords[i][1],
          coords[i + TURN_SEGMENT][0], coords[i + TURN_SEGMENT][1]
        );
        const delta = angleDiff(b1, b2);
        if (Math.abs(delta) < TURN_THRESHOLD) continue;

        // Merge with last turn if they're very close on the ground
        if (result.length > 0) {
          const prev = result[result.length - 1];
          const d = haversine(prev.lat, prev.lng, coords[i][0], coords[i][1]);
          if (d < TURN_MERGE_M) {
            // Keep the one with the larger absolute angle
            if (Math.abs(delta) > Math.abs(prev.delta)) {
              result[result.length - 1] = { idx: i, lat: coords[i][0], lng: coords[i][1], delta, label: turnLabel(delta), arrow: turnArrowChar(delta) };
            }
            continue;
          }
        }

        result.push({ idx: i, lat: coords[i][0], lng: coords[i][1], delta, label: turnLabel(delta), arrow: turnArrowChar(delta) });
      }
      return result;
    }

    // ── Turn markers on map ───────────────────────────────────────────────────
    function drawTurnMarkers() {
      clearTurnMarkers();
      if (!map) return;
      turns.forEach((t, i) => {
        const icon = L.divIcon({
          className: '',
          html: `<div style="
            width:20px;height:20px;
            background:#ff9f1c;
            border:2px solid #fff;
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:11px;line-height:1;color:#fff;font-weight:700;
            box-shadow:0 1px 4px rgba(0,0,0,0.5);
          ">${i + 1}</div>`,
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        });
        const marker = L.marker([t.lat, t.lng], { icon })
          .bindTooltip(`${t.arrow} ${t.label}`, { className: 'turn-tip', permanent: false, direction: 'top', offset: [0, -12] })
          .addTo(map);
        turnMarkers.push(marker);
      });
    }

    function clearTurnMarkers() {
      turnMarkers.forEach(m => m.remove());
      turnMarkers = [];
    }

    // ── Turn guidance (called on each GPS fix) ────────────────────────────────
    function updateTurnGuide(lat, lng) {
      if (!running || !gpxCoords.length || !turns.length) { hideTurnCard(); return; }

      // Advance route progress: search a window forward (+40) with small backward slack (-5)
      const searchStart = Math.max(0, routeProgress - 5);
      const searchEnd   = Math.min(gpxCoords.length - 1, routeProgress + 40);
      let best = routeProgress, bestDist = Infinity;
      for (let i = searchStart; i <= searchEnd; i++) {
        const d = haversine(lat, lng, gpxCoords[i][0], gpxCoords[i][1]);
        if (d < bestDist) { bestDist = d; best = i; }
      }

      // Off-route: if we've strayed beyond the threshold, silently ignore the
      // route — no turn guidance — and don't advance progress. Resumes
      // automatically once back within range.
      if (bestDist > OFF_ROUTE_M) { hideTurnCard(); return; }

      routeProgress = best;

      // Next turn that's still ahead of us
      const next = turns.find(t => t.idx > routeProgress);
      if (!next) { hideTurnCard(); return; }

      const dist = haversine(lat, lng, next.lat, next.lng);
      if (dist > TURN_WARN_M) { hideTurnCard(); return; }

      const imminent = dist <= TURN_NOW_M;
      const distText = imminent ? 'Turn now!' : `in ${Math.round(dist)} m`;
      showTurnCard(next.arrow, next.label, distText, imminent);

      // Voice: announce the approach once, then "now" once, per turn
      if (next.label !== 'Continue straight') {
        if (imminent && spokenNowIdx !== next.idx) {
          spokenNowIdx = next.idx;
          speak(`${next.label} now`);
        } else if (!imminent && spokenWarnIdx !== next.idx) {
          spokenWarnIdx = next.idx;
          speak(`${next.label} in ${Math.round(dist)} meters`);
        }
      }
    }

    function showTurnCard(arrow, label, distText, imminent) {
      const card = document.getElementById('turnCard');
      document.getElementById('turnArrow').textContent     = arrow;
      document.getElementById('turnDirection').textContent = label;
      document.getElementById('turnDist').textContent      = distText;
      card.className = 'turn-card visible' + (imminent ? ' imminent' : '');
    }

    function hideTurnCard() {
      document.getElementById('turnCard').className = 'turn-card';
    }

    // ── Target pace controls ──────────────────────────────────────────────────
    function adjustTarget(part, delta) {
      if (part === 'min') {
        targetMin = Math.max(1, Math.min(30, targetMin + delta));
      } else {
        targetSec = (targetSec + delta + 60) % 60;
        targetSec = Math.round(targetSec / 5) * 5 % 60;
      }
      targetMinEl.textContent = targetMin;
      targetSecEl.textContent = String(targetSec).padStart(2, '0');
      renderPace(smoothSpeed);
    }

    function targetSeconds() { return targetMin * 60 + targetSec; }

    // ── Tracking ─────────────────────────────────────────────────────────────
    function toggleTracking() {
      if (running) stopTracking(); else startTracking();
    }

    function startTracking() {
      running = true;
      startTime = Date.now();
      totalDistance = 0;
      lastPos = null;
      smoothSpeed = 0;
      paceSamples = [];
      paceHistory = [];
      lastHistAt = 0;
      motionSamples = [];
      routeCoords = [];
      routeProgress = 0;
      lastCueZone = null;
      lastCueAt = 0;
      spokenWarnIdx = -1;
      spokenNowIdx = -1;
      if (routeLine) routeLine.setLatLngs([]);
      if (voiceOn) speak('Run started');
      btnStart.textContent = 'Stop';
      btnStart.classList.add('running');
      document.body.classList.add('running');
      document.querySelector('.target-section').classList.add('locked');
      if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(wl => { wakeLock = wl; }).catch(() => {});
      timerInterval = setInterval(updateTimer, 1000);
      watchId = navigator.geolocation.watchPosition(onPosition, onGeoError, {
        enableHighAccuracy: true, timeout: 5000, maximumAge: 1000,
      });
      startMotionTracking();
    }

    function stopTracking() {
      running = false;
      if (voiceOn) speak('Run stopped');

      // Capture the run for the summary graph before we reset everything
      const summary = {
        samples: paceHistory.slice(),
        distM: totalDistance,
        timeSec: startTime ? (Date.now() - startTime) / 1000 : 0,
      };

      btnStart.textContent = 'Start Run';
      btnStart.classList.remove('running');
      document.body.classList.remove('running');
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (motionDecayTimer) { clearInterval(motionDecayTimer); motionDecayTimer = null; }
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      window.removeEventListener('devicemotion', onDeviceMotion);
      document.querySelector('.target-section').classList.remove('locked');
      setGps('locked', 'GPS Ready');
      paceValue.textContent = '--:--';
      paceValue.className = 'pace-value idle';
      paceDelta.textContent = '';
      paceDelta.className = 'pace-delta';
      mapPaceVal.textContent = '--:--';
      mapPaceVal.className = 'map-pace-val idle';
      hideTurnCard();
      setZone(null);
      statSpeed.textContent = '0.0';
      statDistance.textContent = '0.00';
      statTime.textContent = '0:00';
      totalDistance = 0;
      startTime = null;

      // Show the run summary + pace graph if we gathered enough data
      if (summary.distM > 50 && summary.samples.length >= 2) showSummary(summary);
    }

    // ── Position handler ──────────────────────────────────────────────────────
    function onPosition(pos) {
      const { latitude, longitude, speed, accuracy } = pos.coords;
      const now = pos.timestamp;
      setGps('locked', 'GPS');

      const stale = !lastPos || (now - lastPos.timestamp) > 8000;
      if (!stale && accuracy > 25) {
        accuracyBar.textContent = `±${Math.round(accuracy)} m — weak signal, skipping`;
        return;
      }
      accuracyBar.textContent = accuracy ? `±${Math.round(accuracy)} m accuracy` : '';

      // Always update map position
      updateMap(latitude, longitude);

      if (!running) return;

      if (lastPos) {
        const d = haversine(lastPos.lat, lastPos.lng, latitude, longitude);
        totalDistance += d;
      }
      lastPos = { lat: latitude, lng: longitude, timestamp: now };

      // Trailing-window pace: average speed over the last PACE_WINDOW_MS of
      // movement rather than the single last fix. Random GPS error cancels out
      // across the window, so the displayed pace is far steadier.
      paceSamples.push({ t: now, dist: totalDistance });
      const cutoff = now - PACE_WINDOW_MS;
      // Keep one sample at/just before the cutoff as the window's start anchor
      while (paceSamples.length > 2 && paceSamples[1].t < cutoff) paceSamples.shift();

      const oldest = paceSamples[0];
      const span = (now - oldest.t) / 1000; // seconds spanned by the window
      if (span >= 1) {
        const winSpeed = (totalDistance - oldest.dist) / span;
        // Gentle EMA on top of the window removes the last bit of step-jitter
        smoothSpeed = smoothSpeed === 0 ? winSpeed : smoothSpeed + SMOOTHING * (winSpeed - smoothSpeed);
      }
      renderPace(smoothSpeed);
      renderStats();
      updateTurnGuide(latitude, longitude);

      // Record a point for the post-run pace graph (throttled, moving only)
      if (smoothSpeed >= HIST_MIN_SPEED && now - lastHistAt >= HIST_INTERVAL_MS) {
        lastHistAt = now;
        paceHistory.push({ t: (now - startTime) / 1000, distM: totalDistance, speed: smoothSpeed });
      }
    }

    function onGeoError(err) {
      setGps('error', 'Error');
      accuracyBar.textContent = geoErrorMsg(err);
    }

    // ── DeviceMotion: stop detection ──────────────────────────────────────────
    function startMotionTracking() {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(r => { if (r === 'granted') window.addEventListener('devicemotion', onDeviceMotion); })
          .catch(() => {});
      } else if (typeof DeviceMotionEvent !== 'undefined') {
        window.addEventListener('devicemotion', onDeviceMotion);
      }
      motionDecayTimer = setInterval(checkMotionDecay, 500);
    }

    function onDeviceMotion(e) {
      const acc = e.accelerationIncludingGravity;
      if (!acc || acc.x == null) return;
      const mag = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
      motionSamples.push(mag);
      if (motionSamples.length > MOTION_WINDOW) motionSamples.shift();
    }

    function checkMotionDecay() {
      if (!running || motionSamples.length < MOTION_WINDOW) return;
      const mean = motionSamples.reduce((a, b) => a + b, 0) / motionSamples.length;
      const variance = motionSamples.reduce((a, b) => a + (b - mean) ** 2, 0) / motionSamples.length;
      const isStationary = variance < STATIONARY_VARIANCE && Math.abs(mean - 9.81) < STATIONARY_GRAVITY;
      if (isStationary && smoothSpeed > 0) {
        smoothSpeed *= 0.7;
        if (smoothSpeed < 0.3) smoothSpeed = 0;
        renderPace(smoothSpeed);
        renderStats();
      }
    }

    // ── Rendering ─────────────────────────────────────────────────────────────
    function setZone(zone) {
      document.body.classList.remove('z-ahead', 'z-near', 'z-behind');
      if (zone) document.body.classList.add('z-' + zone);
    }

    function renderPace(speedMs) {
      const distPerUnit = unit === 'km' ? 1000 : 1609.34;
      paceUnit.textContent = `min / ${unit}`;
      mapPaceUnit.textContent = `min / ${unit}`;

      if (speedMs < 0.2) {
        paceValue.textContent = '--:--';
        paceValue.className = 'pace-value idle';
        mapPaceVal.textContent = '--:--';
        mapPaceVal.className = 'map-pace-val idle';
        statSpeed.textContent = '0.0';
        paceDelta.textContent = '';
        paceDelta.className = 'pace-delta';
        setZone(null);
        return;
      }

      const secPerUnit = distPerUnit / speedMs;
      const mins = Math.floor(secPerUnit / 60);
      const secs = Math.floor(secPerUnit % 60);
      const paceStr = `${mins}:${String(secs).padStart(2, '0')}`;
      paceValue.textContent = paceStr;
      mapPaceVal.textContent = paceStr;

      const target = targetSeconds();
      const diff = secPerUnit - target;
      let zone = diff < -30 ? 'ahead' : diff <= 30 ? 'near' : 'behind';

      paceValue.className = `pace-value ${zone}`;
      mapPaceVal.className = `map-pace-val ${zone}`;
      if (running) setZone(zone); else setZone(null);
      maybeSpeakPace(zone);

      const absDiff = Math.abs(Math.round(diff));
      const dMin = Math.floor(absDiff / 60);
      const dSec = absDiff % 60;
      const diffStr = dMin > 0 ? `${dMin}:${String(dSec).padStart(2,'0')}` : `0:${String(dSec).padStart(2,'0')}`;

      if (diff < -5) {
        paceDelta.textContent = `${diffStr} ahead of target`;
        paceDelta.className = 'pace-delta ahead';
      } else if (diff > 5) {
        paceDelta.textContent = `${diffStr} behind target`;
        paceDelta.className = 'pace-delta behind';
      } else {
        paceDelta.textContent = 'On pace';
        paceDelta.className = 'pace-delta near';
      }

      statSpeed.textContent = unit === 'km' ? (speedMs * 3.6).toFixed(1) : (speedMs * 2.237).toFixed(1);
    }

    function renderStats() {
      const dist = unit === 'km' ? totalDistance / 1000 : totalDistance / 1609.34;
      statDistance.textContent = dist.toFixed(2);
    }

    function updateTimer() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      statTime.textContent = h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    }

    // ── Run summary + pace graph ──────────────────────────────────────────────
    function fmtClock(totalSec) {
      const t = Math.round(totalSec);
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    }

    function fmtPace(sec) {
      if (!isFinite(sec) || sec <= 0) return '--:--';
      let m = Math.floor(sec / 60), s = Math.round(sec % 60);
      if (s === 60) { m += 1; s = 0; }
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function showSummary(summary) {
      const distPerUnit = unit === 'km' ? 1000 : 1609.34;

      // Per-sample pace (seconds per unit) from recorded speed
      const pts = summary.samples.map(s => ({
        d: s.distM / distPerUnit,                 // distance in current unit
        pace: distPerUnit / s.speed,              // sec per unit
      }));

      const distUnit = summary.distM / distPerUnit;
      const avgPace  = distUnit > 0 ? summary.timeSec / distUnit : 0;
      const bestPace = pts.reduce((min, p) => Math.min(min, p.pace), Infinity);

      document.getElementById('sumDist').textContent = distUnit.toFixed(2);
      document.getElementById('sumDistLbl').textContent = unit;
      document.getElementById('sumTime').textContent = fmtClock(summary.timeSec);
      document.getElementById('sumAvg').textContent  = fmtPace(avgPace);
      document.getElementById('sumBest').textContent = fmtPace(bestPace);
      document.getElementById('summaryFoot').textContent = `Pace over distance · min/${unit}`;

      document.getElementById('summaryChart').innerHTML = buildPaceChart(pts);
      document.getElementById('summaryOverlay').classList.add('open');
    }

    function closeSummary() {
      document.getElementById('summaryOverlay').classList.remove('open');
    }

    // Build a minimal SVG line/area chart of pace vs distance.
    // Y is inverted so faster pace (smaller seconds) sits higher.
    function buildPaceChart(pts) {
      if (pts.length < 2) return '<div class="empty">Not enough data for a graph</div>';

      const W = 340, H = 200;
      const padL = 46, padR = 14, padT = 14, padB = 26;
      const plotW = W - padL - padR;
      const plotH = H - padT - padB;

      const maxD = Math.max(...pts.map(p => p.d));
      let minP = Math.min(...pts.map(p => p.pace));
      let maxP = Math.max(...pts.map(p => p.pace));
      if (maxP - minP < 20) { maxP += 10; minP = Math.max(0, minP - 10); } // avoid flat scale
      const padP = (maxP - minP) * 0.1;
      minP -= padP; maxP += padP;

      const x = d => padL + (maxD ? (d / maxD) * plotW : 0);
      const y = p => padT + (1 - (p - minP) / (maxP - minP)) * plotH; // invert

      const line = pts.map((p, i) => `${i ? 'L' : 'M'}${x(p.d).toFixed(1)},${y(p.pace).toFixed(1)}`).join(' ');
      const area = `${line} L${x(pts[pts.length-1].d).toFixed(1)},${padT+plotH} L${x(pts[0].d).toFixed(1)},${padT+plotH} Z`;

      // Y gridlines: fastest (top) and slowest (bottom) pace labels
      const yTicks = [minP + padP, maxP - padP]; // back off the padding for nicer labels
      const grid = yTicks.map(p => {
        const yy = y(p).toFixed(1);
        return `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#26262f" stroke-width="1"/>`
             + `<text x="${padL-8}" y="${(+yy+4).toFixed(1)}" fill="#9a9aa6" font-size="11" text-anchor="end">${fmtPace(p)}</text>`;
      }).join('');

      // X labels: start and end distance
      const xLabels = `<text x="${padL}" y="${H-6}" fill="#9a9aa6" font-size="11" text-anchor="start">0</text>`
                    + `<text x="${W-padR}" y="${H-6}" fill="#9a9aa6" font-size="11" text-anchor="end">${maxD.toFixed(2)} ${unit}</text>`;

      return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="paceFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00e676" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${grid}
        <path d="${area}" fill="url(#paceFill)"/>
        <path d="${line}" fill="none" stroke="#00e676" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${xLabels}
      </svg>`;
    }

    // ── Unit toggle ───────────────────────────────────────────────────────────
    function setUnit(u) {
      unit = u;
      document.getElementById('btnKm').classList.toggle('active', u === 'km');
      document.getElementById('btnMi').classList.toggle('active', u === 'mi');
      document.getElementById('statSpeedLabel').textContent = u === 'km' ? 'km/h' : 'mph';
      document.getElementById('statDistLabel').textContent = u;
      document.getElementById('targetUnit').textContent = `/ ${u}`;
      renderPace(smoothSpeed);
      renderStats();
    }

    // ── Haversine (metres) ────────────────────────────────────────────────────
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ── Voice cues ────────────────────────────────────────────────────────────
    function speak(text, interrupt = true) {
      if (!voiceOn || !('speechSynthesis' in window)) return;
      if (interrupt) speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.05;
      u.pitch = 1;
      u.volume = 1;
      speechSynthesis.speak(u);
    }

    function toggleVoice() {
      voiceOn = !voiceOn;
      document.getElementById('btnVoice').textContent = voiceOn ? '🔊' : '🔇';
      document.getElementById('btnVoice').classList.toggle('active', voiceOn);
      try { localStorage.setItem('voiceOn', voiceOn ? '1' : '0'); } catch (e) {}
      if (voiceOn) {
        // Speaking inside this tap unlocks audio on iOS/Safari
        speak('Voice cues on');
      } else if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
      }
    }

    // Announce pace zone changes (and periodic reminders while off pace)
    function maybeSpeakPace(zone) {
      if (!voiceOn || !running) return;
      const now = Date.now();
      const changed = zone !== lastCueZone;
      const offPace = zone === 'ahead' || zone === 'behind';

      // Speak on a zone change (throttled), or re-remind if still off pace
      let shouldSpeak = false;
      if (changed && now - lastCueAt >= CUE_GAP_MS) shouldSpeak = true;
      else if (!changed && offPace && now - lastCueAt >= CUE_REMIND_MS) shouldSpeak = true;

      lastCueZone = zone;
      if (!shouldSpeak) return;
      lastCueAt = now;

      const phrase = zone === 'behind' ? 'Speed up, behind target'
                   : zone === 'ahead'  ? 'Ease back, ahead of target'
                   : 'On pace';
      speak(phrase);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setGps(state, label) {
      gpsDot.className = 'gps-dot ' + state;
      gpsLabel.textContent = label;
    }

    function geoErrorMsg(err) {
      switch (err.code) {
        case 1: return 'Location access denied. Please allow in browser settings.';
        case 2: return 'Position unavailable. Check GPS signal.';
        case 3: return 'GPS timeout. Try moving to an open area.';
        default: return 'Unknown GPS error.';
      }
    }
  </script>
</body>
</html>
