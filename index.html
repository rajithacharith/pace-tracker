<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Pace Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text-primary: #ffffff;
      --text-secondary: #888;
      --text-dim: #555;
      --warn: #ff9800;
      --error: #f44336;
      --green: #00e676;
      --yellow: #ffd600;
      --red: #f44336;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 24px;
      overflow: hidden;
      touch-action: none;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .gps-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .gps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .gps-dot.acquiring { background: var(--warn); animation: pulse 1.2s infinite; }
    .gps-dot.locked    { background: var(--green); }
    .gps-dot.error     { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main pace display ── */
    .main-display {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .pace-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .pace-value {
      font-size: clamp(72px, 22vw, 116px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: var(--text-primary);
      transition: color 0.4s;
    }
    .pace-value.idle   { color: var(--text-dim); }
    .pace-value.ahead  { color: var(--green); }
    .pace-value.near   { color: var(--yellow); }
    .pace-value.behind { color: var(--red); }

    .pace-unit {
      font-size: 17px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    /* Delta badge: shows +0:12 behind / -0:08 ahead */
    .pace-delta {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      padding: 4px 14px;
      border-radius: 20px;
      background: transparent;
      color: transparent;
      transition: color 0.4s, background 0.4s;
      min-width: 80px;
      text-align: center;
    }
    .pace-delta.ahead  { background: rgba(0,230,118,0.12); color: var(--green); }
    .pace-delta.near   { background: rgba(255,214,0,0.12);  color: var(--yellow); }
    .pace-delta.behind { background: rgba(244,67,54,0.12);  color: var(--red); }

    /* ── Target pace setter ── */
    .target-section {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .target-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .target-setter {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
    }

    .target-group {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .target-sep {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-secondary);
      padding: 0 2px;
      line-height: 1;
      align-self: center;
    }

    .adj-btn {
      width: 44px;
      height: 56px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .adj-btn:active { color: var(--text-primary); }

    .target-display {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      min-width: 36px;
      text-align: center;
      line-height: 1;
    }

    .target-unit {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-right: 12px;
    }

    .target-section.locked .adj-btn {
      opacity: 0.2;
      pointer-events: none;
    }

    .target-section.locked .target-display,
    .target-section.locked .target-sep,
    .target-section.locked .target-unit {
      opacity: 0.4;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 3px;
    }

    /* ── Bottom controls ── */
    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .unit-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .unit-btn {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .unit-btn.active { background: var(--green); color: #000; }

    .btn-start {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid var(--green);
      background: transparent;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(0.93); }
    .btn-start.running { border-color: var(--red); color: var(--red); }

    .accuracy-bar {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      min-height: 16px;
    }

    /* ── Permission overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      text-align: center;
      z-index: 10;
    }
    .overlay.hidden { display: none; }
    .overlay-icon  { font-size: 56px; }
    .overlay-title { font-size: 22px; font-weight: 700; }
    .overlay-body  { font-size: 15px; color: var(--text-secondary); line-height: 1.6; max-width: 300px; }

    .btn-primary {
      padding: 14px 36px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:active { transform: scale(0.96); }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="overlay-icon">📍</div>
    <div class="overlay-title">Location Access Needed</div>
    <div class="overlay-body">Pace Tracker uses GPS to calculate your running pace in real time.</div>
    <button class="btn-primary" id="btnAllow">Enable GPS</button>
    <div class="overlay-body" id="overlayError" style="color:var(--red);display:none;"></div>
  </div>

  <header>
    <span class="app-title">Pace Tracker</span>
    <div class="gps-status">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsLabel">—</span>
    </div>
  </header>

  <!-- Current pace -->
  <div class="main-display">
    <div class="pace-label">Current Pace</div>
    <div class="pace-value idle" id="paceValue">--:--</div>
    <div class="pace-unit" id="paceUnit">min / km</div>
    <div class="pace-delta" id="paceDelta"></div>
  </div>

  <!-- Target pace setter -->
  <div class="target-section">
    <div class="target-label">Target Pace</div>
    <div class="target-setter">
      <!-- Minutes -->
      <div class="target-group">
        <button class="adj-btn" onclick="adjustTarget('min', 1)">＋</button>
        <div class="target-display" id="targetMin">6</div>
        <button class="adj-btn" onclick="adjustTarget('min', -1)">－</button>
      </div>
      <div class="target-sep">:</div>
      <!-- Seconds -->
      <div class="target-group">
        <button class="adj-btn" onclick="adjustTarget('sec', 5)">＋</button>
        <div class="target-display" id="targetSec">00</div>
        <button class="adj-btn" onclick="adjustTarget('sec', -5)">－</button>
      </div>
      <div class="target-unit" id="targetUnit">/ km</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statSpeed">0.0</div>
      <div class="stat-label" id="statSpeedLabel">km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statDistance">0.00</div>
      <div class="stat-label" id="statDistLabel">km</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTime">0:00</div>
      <div class="stat-label">time</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="unit-toggle">
      <button class="unit-btn active" id="btnKm" onclick="setUnit('km')">KM</button>
      <button class="unit-btn" id="btnMi" onclick="setUnit('mi')">MI</button>
    </div>
    <button class="btn-start" id="btnStart" onclick="toggleTracking()">START</button>
    <div class="accuracy-bar" id="accuracyBar"></div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let watchId = null, wakeLock = null;
    let running = false;
    let unit = 'km';
    let startTime = null, timerInterval = null;
    let totalDistance = 0;
    let lastPos = null;
    const SMOOTHING = 0.25;
    let smoothSpeed = 0;

    // Target pace in total seconds per unit (default 6:00)
    let targetMin = 6, targetSec = 0;

    // ── DeviceMotion state ────────────────────────────────────────────────────
    const MOTION_WINDOW = 60;          // ~1 second of samples at ~60Hz
    const STATIONARY_VARIANCE = 0.8;   // m²/s⁴ — below this = not moving
    const STATIONARY_GRAVITY  = 1.5;   // m/s²  — mean within this of 9.81 = not moving
    let motionSamples = [];
    let motionDecayTimer = null;

    // ── DOM ───────────────────────────────────────────────────────────────────
    const overlay      = document.getElementById('overlay');
    const overlayError = document.getElementById('overlayError');
    const gpsDot       = document.getElementById('gpsDot');
    const gpsLabel     = document.getElementById('gpsLabel');
    const paceValue    = document.getElementById('paceValue');
    const paceUnit     = document.getElementById('paceUnit');
    const paceDelta    = document.getElementById('paceDelta');
    const statSpeed    = document.getElementById('statSpeed');
    const statDistance = document.getElementById('statDistance');
    const statTime     = document.getElementById('statTime');
    const btnStart     = document.getElementById('btnStart');
    const accuracyBar  = document.getElementById('accuracyBar');
    const targetMinEl  = document.getElementById('targetMin');
    const targetSecEl  = document.getElementById('targetSec');

    // ── GPS init ──────────────────────────────────────────────────────────────
    if (!('geolocation' in navigator)) {
      overlayError.textContent = 'Geolocation not supported by this browser.';
      overlayError.style.display = 'block';
      document.getElementById('btnAllow').style.display = 'none';
    }
    document.getElementById('btnAllow').addEventListener('click', requestLocation);
    requestLocation();

    function requestLocation() {
      overlayError.style.display = 'none';
      setGps('acquiring', 'Acquiring…');
      navigator.geolocation.getCurrentPosition(
        () => { overlay.classList.add('hidden'); setGps('locked', 'GPS Ready'); },
        (err) => { setGps('error', 'Error'); overlayError.textContent = geoErrorMsg(err); overlayError.style.display = 'block'; },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    // ── Target pace controls ──────────────────────────────────────────────────
    function adjustTarget(part, delta) {
      if (part === 'min') {
        targetMin = Math.max(1, Math.min(30, targetMin + delta));
      } else {
        targetSec = (targetSec + delta + 60) % 60;
        // round to nearest 5
        targetSec = Math.round(targetSec / 5) * 5 % 60;
      }
      targetMinEl.textContent = targetMin;
      targetSecEl.textContent = String(targetSec).padStart(2, '0');
      renderPace(smoothSpeed);
    }

    function targetSeconds() {
      return targetMin * 60 + targetSec;
    }

    // ── Tracking ─────────────────────────────────────────────────────────────
    function toggleTracking() {
      if (running) stopTracking(); else startTracking();
    }

    function startTracking() {
      running = true;
      startTime = Date.now();
      totalDistance = 0;
      lastPos = null;
      smoothSpeed = 0;
      motionSamples = [];
      btnStart.textContent = 'STOP';
      btnStart.classList.add('running');
      document.querySelector('.target-section').classList.add('locked');
      if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(wl => { wakeLock = wl; }).catch(() => {});
      timerInterval = setInterval(updateTimer, 1000);
      watchId = navigator.geolocation.watchPosition(onPosition, onGeoError, {
        enableHighAccuracy: true, timeout: 5000, maximumAge: 1000,
      });
      startMotionTracking();
    }

    function stopTracking() {
      running = false;
      btnStart.textContent = 'START';
      btnStart.classList.remove('running');
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (motionDecayTimer) { clearInterval(motionDecayTimer); motionDecayTimer = null; }
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      window.removeEventListener('devicemotion', onDeviceMotion);
      document.querySelector('.target-section').classList.remove('locked');
      setGps('locked', 'GPS Ready');
      paceValue.textContent = '--:--';
      paceValue.className = 'pace-value idle';
      paceDelta.textContent = '';
      paceDelta.className = 'pace-delta';
      statSpeed.textContent = '0.0';
      statDistance.textContent = '0.00';
      statTime.textContent = '0:00';
      totalDistance = 0;
      startTime = null;
    }

    // ── Position handler ──────────────────────────────────────────────────────
    function onPosition(pos) {
      const { latitude, longitude, speed, accuracy } = pos.coords;
      const now = pos.timestamp;
      setGps('locked', 'GPS');

      // Skip junk fixes: if we already have a recent fix and this one is too noisy, ignore it.
      // Always accept if it's the first fix or the last one is stale (>8s).
      const stale = !lastPos || (now - lastPos.timestamp) > 8000;
      if (!stale && accuracy > 25) {
        accuracyBar.textContent = `±${Math.round(accuracy)} m — weak signal, skipping`;
        return;
      }
      accuracyBar.textContent = accuracy ? `±${Math.round(accuracy)} m accuracy` : '';

      if (!running) return;

      let rawSpeed = null;
      if (lastPos) {
        const d = haversine(lastPos.lat, lastPos.lng, latitude, longitude);
        totalDistance += d;
        if (speed != null && speed >= 0) {
          rawSpeed = speed;
        } else {
          const dt = (now - lastPos.timestamp) / 1000;
          rawSpeed = dt > 0 ? d / dt : null;
        }
      }
      lastPos = { lat: latitude, lng: longitude, timestamp: now };
      if (rawSpeed !== null) {
        smoothSpeed = smoothSpeed === 0 ? rawSpeed : smoothSpeed + SMOOTHING * (rawSpeed - smoothSpeed);
      }
      renderPace(smoothSpeed);
      renderStats();
    }

    function onGeoError(err) {
      setGps('error', 'Error');
      accuracyBar.textContent = geoErrorMsg(err);
    }

    // ── DeviceMotion: stop detection ──────────────────────────────────────────
    function startMotionTracking() {
      // iOS 13+ requires an explicit permission request on a user gesture (START tap)
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(r => { if (r === 'granted') window.addEventListener('devicemotion', onDeviceMotion); })
          .catch(() => {});
      } else if (typeof DeviceMotionEvent !== 'undefined') {
        window.addEventListener('devicemotion', onDeviceMotion);
      }

      // Every 500ms, check if the rolling window says we've stopped
      motionDecayTimer = setInterval(checkMotionDecay, 500);
    }

    function onDeviceMotion(e) {
      const acc = e.accelerationIncludingGravity;
      if (!acc || acc.x == null) return;
      const mag = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
      motionSamples.push(mag);
      if (motionSamples.length > MOTION_WINDOW) motionSamples.shift();
    }

    function checkMotionDecay() {
      if (!running || motionSamples.length < MOTION_WINDOW) return;

      const mean = motionSamples.reduce((a, b) => a + b, 0) / motionSamples.length;
      const variance = motionSamples.reduce((a, b) => a + (b - mean) ** 2, 0) / motionSamples.length;

      // Stationary: acceleration magnitude hovers near gravity (9.81) with little variance
      const isStationary = variance < STATIONARY_VARIANCE && Math.abs(mean - 9.81) < STATIONARY_GRAVITY;

      if (isStationary && smoothSpeed > 0) {
        smoothSpeed *= 0.7;  // fast decay — stops showing stale pace immediately
        if (smoothSpeed < 0.3) smoothSpeed = 0;
        renderPace(smoothSpeed);
        renderStats();
      }
    }

    // ── Rendering ─────────────────────────────────────────────────────────────
    function renderPace(speedMs) {
      const distPerUnit = unit === 'km' ? 1000 : 1609.34;
      paceUnit.textContent = `min / ${unit}`;

      if (speedMs < 0.2) {
        paceValue.textContent = '--:--';
        paceValue.className = 'pace-value idle';
        statSpeed.textContent = '0.0';
        paceDelta.textContent = '';
        paceDelta.className = 'pace-delta';
        return;
      }

      const secPerUnit = distPerUnit / speedMs;
      const mins = Math.floor(secPerUnit / 60);
      const secs = Math.floor(secPerUnit % 60);
      paceValue.textContent = `${mins}:${String(secs).padStart(2, '0')}`;

      const target = targetSeconds();
      const diff = secPerUnit - target; // positive = slower (behind), negative = faster (ahead)

      let zone;
      if (diff < -30)      zone = 'ahead';   // >30s faster than target
      else if (diff <= 30) zone = 'near';    // within ±30s
      else                 zone = 'behind';  // >30s slower

      paceValue.className = `pace-value ${zone}`;

      // Delta badge
      const absDiff = Math.abs(Math.round(diff));
      const dMin = Math.floor(absDiff / 60);
      const dSec = absDiff % 60;
      const diffStr = dMin > 0
        ? `${dMin}:${String(dSec).padStart(2,'0')}`
        : `0:${String(dSec).padStart(2,'0')}`;

      if (diff < -5) {
        paceDelta.textContent = `${diffStr} ahead`;
        paceDelta.className = 'pace-delta ahead';
      } else if (diff > 5) {
        paceDelta.textContent = `${diffStr} behind`;
        paceDelta.className = 'pace-delta behind';
      } else {
        paceDelta.textContent = 'on pace';
        paceDelta.className = 'pace-delta near';
      }

      statSpeed.textContent = unit === 'km'
        ? (speedMs * 3.6).toFixed(1)
        : (speedMs * 2.237).toFixed(1);
    }

    function renderStats() {
      const dist = unit === 'km' ? totalDistance / 1000 : totalDistance / 1609.34;
      statDistance.textContent = dist.toFixed(2);
    }

    function updateTimer() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      statTime.textContent = h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    }

    // ── Unit toggle ───────────────────────────────────────────────────────────
    function setUnit(u) {
      unit = u;
      document.getElementById('btnKm').classList.toggle('active', u === 'km');
      document.getElementById('btnMi').classList.toggle('active', u === 'mi');
      document.getElementById('statSpeedLabel').textContent = u === 'km' ? 'km/h' : 'mph';
      document.getElementById('statDistLabel').textContent = u;
      document.getElementById('targetUnit').textContent = `/ ${u}`;
      renderPace(smoothSpeed);
      renderStats();
    }

    // ── Haversine (metres) ────────────────────────────────────────────────────
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setGps(state, label) {
      gpsDot.className = 'gps-dot ' + state;
      gpsLabel.textContent = label;
    }

    function geoErrorMsg(err) {
      switch (err.code) {
        case 1: return 'Location access denied. Please allow in browser settings.';
        case 2: return 'Position unavailable. Check GPS signal.';
        case 3: return 'GPS timeout. Try moving to an open area.';
        default: return 'Unknown GPS error.';
      }
    }
  </script>
</body>
</html>
